name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile public packages and example
        run: |
          python -m compileall -q src/evaluate src/simulator/*.py examples scripts/validate_dataset.py

      - name: Dataset layout check
        run: |
          python scripts/validate_dataset.py

      - name: Evaluator CLI smoke test
        run: |
          PYTHONPATH=src python -m evaluate.batch --help
